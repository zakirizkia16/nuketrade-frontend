<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuke Trade — Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config={theme:{extend:{fontFamily:{display:['Space Grotesk','sans-serif'],mono:['JetBrains Mono','monospace']},colors:{chain:{bg:'#060b0a',surface:'#0d1512',card:'#111c18',border:'#1a2e26',muted:'#4a6b5d',text:'#c8e0d4',bright:'#e8f5ee',accent:'#00ff88',danger:'#ff3558'}}}}}
    </script>
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background: #060b0a; color: #c8e0d4; }
        .cv { font-family: 'JetBrains Mono', monospace; }
        .grid-bg {
            background-image: linear-gradient(rgba(0,255,136,0.02) 1px,transparent 1px), linear-gradient(90deg,rgba(0,255,136,0.02) 1px,transparent 1px);
            background-size: 60px 60px;
        }
        input:focus { border-color: #00ff88 !important; box-shadow: 0 0 0 2px rgba(0,255,136,0.1); }
    </style>
</head>
<body class="grid-bg min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-sm">
        <!-- Logo & Title -->
        <div class="flex items-center justify-center gap-2 mb-8">
            <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-chain-accent to-emerald-600 flex items-center justify-center">
                <i class="fa-solid fa-radiation text-chain-bg text-sm"></i>
            </div>
            <span class="font-display font-bold text-chain-bright text-xl">Nuke<span class="text-chain-accent">Trade</span></span>
        </div>

        <!-- Login Card -->
        <div class="bg-chain-card border border-chain-border rounded-xl p-8">
            <h1 class="text-xl font-bold text-chain-bright mb-1">Welcome Back</h1>
            <p class="text-chain-muted text-xs mb-6">Masukkan kredensial untuk mengakses terminal.</p>

            <div class="space-y-4">
                <div>
                    <label class="text-[10px] text-chain-muted uppercase tracking-wider font-medium block mb-1.5">Email</label>
                    <div class="relative">
                        <i class="fa-solid fa-envelope absolute left-3 top-1/2 -translate-y-1/2 text-chain-muted text-xs"></i>
                        <input type="email" id="login-email" class="w-full pl-9 pr-3 py-2.5 rounded-lg bg-chain-surface border border-chain-border text-chain-bright text-sm outline-none transition-all" placeholder="user@nuke.trade">
                    </div>
                </div>
                <div>
                    <label class="text-[10px] text-chain-muted uppercase tracking-wider font-medium block mb-1.5">Password</label>
                    <div class="relative">
                        <i class="fa-solid fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-chain-muted text-xs"></i>
                        <input type="password" id="login-pass" class="w-full pl-9 pr-3 py-2.5 rounded-lg bg-chain-surface border border-chain-border text-chain-bright text-sm outline-none transition-all" placeholder="Masukkan password">
                    </div>
                </div>
                
                <button onclick="handleLogin()" id="login-btn" class="w-full py-2.5 bg-chain-accent/10 border border-chain-accent/30 text-chain-accent font-semibold rounded-lg hover:bg-chain-accent/20 transition-all flex items-center justify-center gap-2 text-sm">
                    <i class="fa-solid fa-right-to-bracket"></i> Masuk
                </button>
            </div>

            <div id="login-err" class="mt-4 text-center text-chain-danger text-xs hidden"></div>
        </div>

        <p class="text-[10px] text-chain-muted text-center mt-6">Dashboard ini bersifat privat. Hanya untuk pengguna terdaftar.</p>
    </div>

    <script>
        // Supabase Init (GANTI PAKAI KEY LO)
        const SUPABASE_URL = 'https://xyzcompany.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhb...key_lo';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function handleLogin() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-pass').value;
            const errEl = document.getElementById('login-err');
            const btn = document.getElementById('login-btn');

            errEl.classList.add('hidden');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Memproses...';
            btn.disabled = true;

            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });

            if (error) {
                errEl.textContent = 'Email atau password salah!';
                errEl.classList.remove('hidden');
                btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Masuk';
                btn.disabled = false;
            } else {
                window.location.href = '/'; // Redirect ke index.html
            }
        }

        // Auto redirect kalau udah login
        supabaseClient.auth.getSession().then(({ data: { session } }) => {
            if (session) window.location.href = '/';
        });
    </script>
</body>
</html>
