<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuke Trade - Admin Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { font-family: 'JetBrains Mono', monospace; background: #060b0a; color: #c8e0d4; }
        .accent { color: #00ff88; }
        .bg-surface { background: #0d1512; }
        .bg-card { background: #111c18; }
        .border-main { border-color: #1a2e26; }
        input:focus { border-color: #00ff88 !important; box-shadow: 0 0 0 2px rgba(0,255,136,0.1); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- Login Section -->
    <div id="login-section" class="bg-card border border-main rounded-lg p-8 w-full max-w-sm">
        <div class="flex items-center gap-2 mb-6">
            <div class="w-7 h-7 rounded-md bg-gradient-to-br from-[#00ff88] to-emerald-600 flex items-center justify-center">
                <i class="fa-solid fa-radiation text-[#060b0a] text-[11px]"></i>
            </div>
            <h1 class="text-lg font-bold text-[#e8f5ee]">Admin <span class="accent">Panel</span></h1>
        </div>
        <p class="text-[11px] text-[#4a6b5d] mb-4">Masukkan password untuk mengelola akses user.</p>
        <input type="password" id="admin-pass" placeholder="Password" class="w-full px-3 py-2.5 rounded-md bg-surface border border-main text-[#e8f5ee] text-sm outline-none mb-3 transition-all">
        <button onclick="loginAdmin()" class="w-full py-2.5 bg-[#00ff88]/10 border border-[#00ff88]/30 text-[#00ff88] text-sm font-semibold rounded-md hover:bg-[#00ff88]/20 transition-all">
            <i class="fa-solid fa-right-to-bracket mr-1"></i> Masuk
        </button>
        <p id="login-error" class="text-[#ff3558] text-[11px] mt-3 hidden">Password salah!</p>
    </div>

    <!-- Dashboard Section -->
    <div id="dashboard-section" class="hidden w-full max-w-4xl">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-bold text-[#e8f5ee]">Access <span class="accent">Manager</span></h1>
                <p class="text-[11px] text-[#4a6b5d] mt-1">Kelola link undangan untuk Nuke Trade dashboard.</p>
            </div>
            <button onclick="generateLink()" class="px-5 py-2.5 bg-[#00ff88]/10 border border-[#00ff88]/30 text-[#00ff88] text-sm font-semibold rounded-md hover:bg-[#00ff88]/20 transition-all flex items-center gap-2">
                <i class="fa-solid fa-plus"></i> Generate Link Baru
            </button>
        </div>

        <!-- New Link PopUp -->
        <div id="new-link-popup" class="hidden mb-6 bg-card border border-[#00ff88]/30 rounded-lg p-4">
            <p class="text-[11px] text-[#4a6b5d] mb-2"><i class="fa-solid fa-check-circle text-[#00ff88] mr-1"></i> Link undangan baru berhasil dibuat! Salin dan kirim ke user:</p>
            <div class="flex gap-2">
                <input type="text" id="new-link-input" readonly class="flex-1 px-3 py-2 rounded-md bg-surface border border-main text-[#00ff88] text-xs outline-none">
                <button onclick="copyLink()" class="px-4 py-2 bg-surface border border-main text-[#e8f5ee] rounded-md hover:border-[#00ff88]/30 transition-all text-xs font-medium">
                    <i class="fa-solid fa-copy mr-1"></i> Copy
                </button>
            </div>
        </div>

        <!-- Table -->
        <div class="bg-card border border-main rounded-lg overflow-hidden">
            <table class="w-full text-left">
                <thead class="border-b border-main text-[#4a6b5d] text-[10px] uppercase tracking-wider">
                    <tr>
                        <th class="p-4">Status</th>
                        <th class="p-4">Token / Link</th>
                        <th class="p-4">Dibuat Pada</th>
                        <th class="p-4 text-right">Aksi</th>
                    </tr>
                </thead>
                <tbody id="links-table" class="text-[11px]">
                    <!-- Data dari JS -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_BASE = 'https://quotes-workplace-towards-jackie.trycloudflare.com/api';
        let adminPassword = '';

        function loginAdmin() {
            const pass = document.getElementById('admin-pass').value;
            adminPassword = pass;
            fetchLinks();
        }

        async function fetchLinks() {
            try {
                const res = await fetch(`${API_BASE}/admin/links`, {
                    headers: { 'adminpassword': adminPassword }
                });
                if (!res.ok) {
                    document.getElementById('login-error').classList.remove('hidden');
                    return;
                }
                document.getElementById('login-error').classList.add('hidden');
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('dashboard-section').classList.remove('hidden');

                const data = await res.json();
                renderTable(data.data);
            } catch (e) {
                alert('Gagal menghubungi server Backend! Pastikan server nyala di port 3001.');
            }
        }

        async function generateLink() {
            const res = await fetch(`${API_BASE}/admin/generate-link`, {
                method: 'POST',
                headers: { 'adminpassword': adminPassword }
            });
            const data = await res.json();
            
            if (data.success) {
                document.getElementById('new-link-input').value = data.link;
                document.getElementById('new-link-popup').classList.remove('hidden');
                fetchLinks(); // Refresh tabel
            }
        }

        async function revokeAccess(id) {
            const res = await fetch(`${API_BASE}/admin/revoke/${id}`, {
                method: 'DELETE',
                headers: { 'adminpassword': adminPassword }
            });
            if (res.ok) {
                fetchLinks(); // Refresh tabel
            }
        }

        function copyLink() {
            const input = document.getElementById('new-link-input');
            navigator.clipboard.writeText(input.value).then(() => {
                alert('Link berhasil disalin!');
            });
        }

        function renderTable(links) {
            const tbody = document.getElementById('links-table');
            tbody.innerHTML = '';
            
            if (links.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="p-4 text-center text-[#4a6b5d]">Belum ada link yang dibuat.</td></tr>';
                return;
            }

            links.forEach(link => {
                const statusClass = link.used ? 'text-[#4a6b5d] bg-surface' : 'text-[#00ff88] bg-[#00ff88]/10';
                const statusText = link.used ? 'Sudah Dipakai' : 'Aktif';
                const date = new Date(link.createdAt).toLocaleString('id-ID');

                tbody.innerHTML += `
                    <tr class="border-b border-main/50 hover:bg-white/[0.01]">
                        <td class="p-4"><span class="px-2 py-1 rounded text-[9px] font-semibold ${statusClass}">${statusText}</span></td>
                        <td class="p-4 text-[#e8f5ee] truncate max-w-[200px]">${link.token}</td>
                        <td class="p-4 text-[#4a6b5d]">${date}</td>
                        <td class="p-4 text-right">
                            <button onclick="revokeAccess('${link.id}')" class="px-3 py-1 bg-[#ff3558]/10 text-[#ff3558] rounded hover:bg-[#ff3558]/20 transition-all text-[9px] font-semibold">
                                <i class="fa-solid fa-ban mr-1"></i>Cabut Akses
                            </button>
                        </td>
                    </tr>
                `;
            });
        }
    </script>
</body>
</html>
